<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span> Equalify</div>
    <label class="switch"><input type="checkbox" id="enabled" checked /><span class="track"></span></label>
  </header>

  <div class="presets">
    <button class="preset" data-preset="flat">Flat</button>
    <button class="preset" data-preset="bass">Bass boost</button>
    <button class="preset" data-preset="slowed">Slowed + reverb</button>
    <button class="preset" data-preset="nightcore">Nightcore</button>
    <button class="preset" data-preset="lofi">Lo-fi</button>
    <button class="preset" data-preset="eightd">8D</button>
  </div>

  <div class="group">
    <div class="ctrl"><label>Preamp <b id="v-preamp">0 dB</b></label><input type="range" id="preamp" min="-12" max="12" step="0.5" value="0" /></div>
    <div class="ctrl"><label>Bass <b id="v-bass">0 dB</b></label><input type="range" id="bass" min="-15" max="15" step="0.5" value="0" /></div>
    <div class="ctrl"><label>Treble <b id="v-treble">0 dB</b></label><input type="range" id="treble" min="-15" max="15" step="0.5" value="0" /></div>
  </div>

  <div class="eq" id="eq"></div>

  <div class="group">
    <div class="ctrl"><label>Reverb <b id="v-reverb">0%</b></label><input type="range" id="reverb" min="0" max="100" value="0" /></div>
    <div class="ctrl"><label>Stereo width <b id="v-width">100%</b></label><input type="range" id="width" min="0" max="200" value="100" /></div>
    <div class="ctrl"><label>Speed <b id="v-speed">100%</b></label><input type="range" id="speed" min="50" max="150" value="100" /></div>
    <div class="ctrl row8d">
      <label class="chk"><input type="checkbox" id="eightD" /> 8D rotation</label>
      <input type="range" id="eightDSpeed" min="0.04" max="0.5" step="0.01" value="0.12" />
    </div>
  </div>

  <p class="note">Works on YouTube, SoundCloud, Bandcamp and most web audio. Spotify and other DRM-protected streams can't be processed.</p>
  <script src="popup.js"></script>
</body>
</html>
